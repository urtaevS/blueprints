blueprint:
  name: Telegram To-do List
  description: >
    –С–∞–Ј–Њ–≤—Л–є –≤–∞—А–Є–∞–љ—В:
    - edit_message –і–ї—П inline-–Ї–љ–Њ–њ–Њ–Ї
    - –њ–µ—А–µ–Ї–ї—О—З–µ–љ–Є–µ Active / All (—В–Њ–ї—М–Ї–Њ –µ—Б–ї–Є –µ—Б—В—М completed)
    - –і–Є–љ–∞–Љ–Є—З–µ—Б–Ї–∞—П –Ї–љ–Њ–њ–Ї–∞ –Ю—З–Є—Б—В–Є—В—М
    - –Ј–∞—Й–Є—В–∞ –Њ—В –і—Г–±–ї–µ–є
    - reopen –њ–Њ вШСпЄП
    - –њ–Њ–і–і–µ—А–ґ–Ї–∞ –і–Њ–±–∞–≤–ї–µ–љ–Є—П —З–µ—А–µ–Ј "," –Є "."
    - —Б–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є—П —З–µ—А–µ–Ј —Б–Ї—А–Є–њ—В—Л (–Њ–њ—Ж–Є–Њ–љ–∞–ї—М–љ–Њ)
    - HA 2025.12+
  domain: automation

  input:
    todo_entity:
      name: To-do —Б–њ–Є—Б–Њ–Ї
      selector:
        entity:
          domain: todo

    telegram_chat_id:
      name: Telegram chat_id
      selector:
        number:

    bot_config_entry_id:
      name: Config Entry ID –±–Њ—В–∞
      selector:
        text:

    sync_script_1_name:
      name: –Э–∞–Ј–≤–∞–љ–Є–µ –Ї–љ–Њ–њ–Ї–Є —Б–Ї—А–Є–њ—В–∞ 1
      selector:
        text: {}
      default: "–°–Ї—А–Є–њ—В 1"

    sync_script_1:
      name: –°–Ї—А–Є–њ—В —Б–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є–Є 1 (–Њ–њ—Ж–Є–Њ–љ–∞–ї—М–љ–Њ)
      selector:
        entity:
          domain: script
      default: ""

    sync_script_2_name:
      name: –Э–∞–Ј–≤–∞–љ–Є–µ –Ї–љ–Њ–њ–Ї–Є —Б–Ї—А–Є–њ—В–∞ 2
      selector:
        text: {}
      default: "–°–Ї—А–Є–њ—В 2"
      
    sync_script_2:
      name: –°–Ї—А–Є–њ—В —Б–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є–Є 2 (–Њ–њ—Ж–Є–Њ–љ–∞–ї—М–љ–Њ)
      selector:
        entity:
          domain: script
      default: ""

    sync_script_3_name:
      name: –Э–∞–Ј–≤–∞–љ–Є–µ –Ї–љ–Њ–њ–Ї–Є —Б–Ї—А–Є–њ—В–∞ 3
      selector:
        text: {}
      default: "–°–Ї—А–Є–њ—В 3"
      
    sync_script_3:
      name: –°–Ї—А–Є–њ—В —Б–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є–Є 3 (–Њ–њ—Ж–Є–Њ–љ–∞–ї—М–љ–Њ)
      selector:
        entity:
          domain: script
      default: ""

mode: restart
max_exceeded: silent

variables:
  todo_entity: !input todo_entity
  chat_id: !input telegram_chat_id
  bot_id: !input bot_config_entry_id
  sync_script_1: !input sync_script_1
  sync_script_2: !input sync_script_2
  sync_script_3: !input sync_script_3
  sync_script_1_name: !input sync_script_1_name
  sync_script_2_name: !input sync_script_2_name
  sync_script_3_name: !input sync_script_3_name

trigger:
  - platform: event
    event_type: telegram_command
  - platform: event
    event_type: telegram_text
  - platform: event
    event_type: telegram_callback

condition:
  - condition: template
    value_template: >
      {{ trigger.event.data.chat_id | int == chat_id | int }}

action:
  - choose:

      ############################################################
      # /start вАФ —В–Њ–ї—М–Ї–Њ —Б–Њ–Њ–±—Й–µ–љ–Є–µ —Б –Ї–ї–∞–≤–Є–∞—В—Г—А–Њ–є (–±–µ–Ј —Б–њ–Є—Б–Ї–∞)
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_command'
                 and trigger.event.data.command == '/start' }}
        sequence:
          - variables:
              has_scripts: >
                {{ sync_script_1 != '' or sync_script_2 != '' or sync_script_3 != '' }}

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ has_scripts }}"
                sequence:
                  - action: telegram_bot.send_message
                    data:
                      config_entry_id: "{{ bot_id }}"
                      target: "{{ chat_id }}"
                      message: "–Ш—Б–њ–Њ–ї—М–Ј—Г–є –Ї–љ–Њ–њ–Ї–Є –≤–љ–Є–Ј—Г вђЗпЄП"
                      keyboard:
                        - "рЯУЛ –Я–Њ–Ї–∞–Ј–∞—В—М —Б–њ–Є—Б–Њ–Ї"
                        - "рЯЧС –Ю—З–Є—Б—В–Є—В—М –≤—Л–њ–Њ–ї–љ–µ–љ–љ—Л–µ"
                        - "рЯФД –°–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є—П"
                      resize_keyboard: true
                      one_time_keyboard: false
              - conditions:
                  - condition: template
                    value_template: "{{ not has_scripts }}"
                sequence:
                  - action: telegram_bot.send_message
                    data:
                      config_entry_id: "{{ bot_id }}"
                      target: "{{ chat_id }}"
                      message: "–Ш—Б–њ–Њ–ї—М–Ј—Г–є –Ї–љ–Њ–њ–Ї–Є –≤–љ–Є–Ј—Г вђЗпЄП"
                      keyboard:
                        - "рЯУЛ –Я–Њ–Ї–∞–Ј–∞—В—М —Б–њ–Є—Б–Њ–Ї"
                        - "рЯЧС –Ю—З–Є—Б—В–Є—В—М –≤—Л–њ–Њ–ї–љ–µ–љ–љ—Л–µ"
                      resize_keyboard: true
                      one_time_keyboard: false

      ############################################################
      # /list вАФ –њ–Њ–Ї–∞–Ј–∞—В—М –∞–Ї—В–Є–≤–љ—Л–µ (–∞–љ–∞–ї–Њ–≥–Є—З–љ–Њ –Ї–љ–Њ–њ–Ї–µ "рЯУЛ –Я–Њ–Ї–∞–Ј–∞—В—М —Б–њ–Є—Б–Њ–Ї")
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_command'
                 and trigger.event.data.command == '/list' }}
        sequence:
          - action: todo.get_items
            target:
              entity_id: "{{ todo_entity }}"
            response_variable: todo_resp

          - variables:
              items: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','needs_action')
                   | list }}
              has_completed: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','completed')
                   | list | length > 0 }}
              text: >
                {% if items | length == 0 %}
                  рЯЫТ –°–њ–Є—Б–Њ–Ї –њ–Њ–Ї—Г–њ–Њ–Ї –њ—Г—Б—В рЯ§ЈвАНвЩВпЄП
                {% else %}
                  рЯЫТ –°–њ–Є—Б–Њ–Ї –њ–Њ–Ї—Г–њ–Њ–Ї:
                {% endif %}
              keyboard: >
                {% set r = namespace(v=[]) %}
                {% for i in items %}
                  {% set r.v = r.v + [[['вЬЕ ' ~ i.summary, '/done_' ~ i.uid]]] %}
                {% endfor %}
                {% if has_completed %}
                  {% set r.v = r.v + [[['рЯУВ –Т—Б–µ','/show_all']]] %}
                {% endif %}
                {{ r.v }}

          - action: telegram_bot.send_message
            data:
              config_entry_id: "{{ bot_id }}"
              target: "{{ chat_id }}"
              message: "{{ text }}"
              inline_keyboard: "{{ keyboard }}"

      ############################################################
      # REPLY: рЯУЛ –Я–Њ–Ї–∞–Ј–∞—В—М —Б–њ–Є—Б–Њ–Ї
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_text'
                 and trigger.event.data.text == 'рЯУЛ –Я–Њ–Ї–∞–Ј–∞—В—М —Б–њ–Є—Б–Њ–Ї' }}
        sequence:
          - action: todo.get_items
            target:
              entity_id: "{{ todo_entity }}"
            response_variable: todo_resp

          - variables:
              items: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','needs_action')
                   | list }}
              has_completed: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','completed')
                   | list | length > 0 }}
              text: >
                {% if items | length == 0 %}
                  рЯЫТ –°–њ–Є—Б–Њ–Ї –њ–Њ–Ї—Г–њ–Њ–Ї –њ—Г—Б—В рЯ§ЈвАНвЩВпЄП
                {% else %}
                  рЯЫТ –°–њ–Є—Б–Њ–Ї –њ–Њ–Ї—Г–њ–Њ–Ї:
                {% endif %}
              keyboard: >
                {% set r = namespace(v=[]) %}
                {% for i in items %}
                  {% set r.v = r.v + [[['вЬЕ ' ~ i.summary, '/done_' ~ i.uid]]] %}
                {% endfor %}
                {% if has_completed %}
                  {% set r.v = r.v + [[['рЯУВ –Т—Б–µ','/show_all']]] %}
                {% endif %}
                {{ r.v }}

          - action: telegram_bot.send_message
            data:
              config_entry_id: "{{ bot_id }}"
              target: "{{ chat_id }}"
              message: "{{ text }}"
              inline_keyboard: "{{ keyboard }}"

      ############################################################
      # REPLY: рЯЧС –Ю—З–Є—Б—В–Є—В—М –≤—Л–њ–Њ–ї–љ–µ–љ–љ—Л–µ
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_text'
                 and trigger.event.data.text == 'рЯЧС –Ю—З–Є—Б—В–Є—В—М –≤—Л–њ–Њ–ї–љ–µ–љ–љ—Л–µ' }}
        sequence:
          - action: todo.remove_completed_items
            target:
              entity_id: "{{ todo_entity }}"

          - action: todo.get_items
            target:
              entity_id: "{{ todo_entity }}"
            response_variable: todo_resp

          - variables:
              items: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','needs_action')
                   | list }}
              text: >
                {% if items | length == 0 %}
                  рЯЫТ –°–њ–Є—Б–Њ–Ї –њ–Њ–Ї—Г–њ–Њ–Ї –њ—Г—Б—В рЯ§ЈвАНвЩВпЄП
                {% else %}
                  рЯЫТ –°–њ–Є—Б–Њ–Ї –њ–Њ–Ї—Г–њ–Њ–Ї:
                {% endif %}
              keyboard: >
                {% set r = namespace(v=[]) %}
                {% for i in items %}
                  {% set r.v = r.v + [[['вЬЕ ' ~ i.summary, '/done_' ~ i.uid]]] %}
                {% endfor %}
                {{ r.v }}

          - action: telegram_bot.send_message
            data:
              config_entry_id: "{{ bot_id }}"
              target: "{{ chat_id }}"
              message: "{{ text }}"
              inline_keyboard: "{{ keyboard }}"

      ############################################################
      # REPLY: рЯФД –°–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є—П вАФ –њ–Њ–Ї–∞–Ј–∞—В—М inline-–Ї–љ–Њ–њ–Ї–Є —Б–Ї—А–Є–њ—В–Њ–≤
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_text'
                 and trigger.event.data.text == 'рЯФД –°–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є—П' }}
        sequence:
          - variables:
              sync_keyboard: >
                {% set scripts = [] %}
                {% if sync_script_1 and sync_script_1 != '' %}
                  {% set scripts = scripts + [[['рЯФє ' ~ sync_script_1_name, '/sync_1']]] %}
                {% endif %}
                {% if sync_script_2 and sync_script_2 != '' %}
                  {% set scripts = scripts + [[['рЯФє ' ~ sync_script_2_name, '/sync_2']]] %}
                {% endif %}
                {% if sync_script_3 and sync_script_3 != '' %}
                  {% set scripts = scripts + [[['рЯФє ' ~ sync_script_3_name, '/sync_3']]] %}
                {% endif %}
                {{ scripts }}

          - action: telegram_bot.send_message
            data:
              config_entry_id: "{{ bot_id }}"
              target: "{{ chat_id }}"
              message: "–Т—Л–±–µ—А–Є –і–µ–є—Б—В–≤–Є–µ"
              inline_keyboard: "{{ sync_keyboard }}"

      ############################################################
      # CALLBACK: –Ч–∞–њ—Г—Б–Ї —Б–Ї—А–Є–њ—В–∞ 1
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_callback'
                 and trigger.event.data.data == '/sync_1'
                 and sync_script_1 != '' }}
        sequence:
          - action: script.turn_on
            target:
              entity_id: "{{ sync_script_1 }}"
          - action: telegram_bot.edit_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message_id: "{{ trigger.event.data.message.message_id }}"
              message: "–Т—Л–њ–Њ–ї–љ–µ–љ–Њ"
          - action: telegram_bot.answer_callback_query
            data:
              config_entry_id: "{{ bot_id }}"
              callback_query_id: "{{ trigger.event.data.id }}"
              message: "–°–Ї—А–Є–њ—В –Ј–∞–њ—Г—Й–µ–љ вЬЕ"

      ############################################################
      # CALLBACK: –Ч–∞–њ—Г—Б–Ї —Б–Ї—А–Є–њ—В–∞ 2
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_callback'
                 and trigger.event.data.data == '/sync_2'
                 and sync_script_2 != '' }}
        sequence:
          - action: script.turn_on
            target:
              entity_id: "{{ sync_script_2 }}"
          - action: telegram_bot.edit_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message_id: "{{ trigger.event.data.message.message_id }}"
              message: "–Т—Л–њ–Њ–ї–љ–µ–љ–Њ"
          - action: telegram_bot.answer_callback_query
            data:
              config_entry_id: "{{ bot_id }}"
              callback_query_id: "{{ trigger.event.data.id }}"
              message: "–°–Ї—А–Є–њ—В –Ј–∞–њ—Г—Й–µ–љ вЬЕ"

      ############################################################
      # CALLBACK: –Ч–∞–њ—Г—Б–Ї —Б–Ї—А–Є–њ—В–∞ 3
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_callback'
                 and trigger.event.data.data == '/sync_3'
                 and sync_script_3 != '' }}
        sequence:
          - action: script.turn_on
            target:
              entity_id: "{{ sync_script_3 }}"
          - action: telegram_bot.edit_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message_id: "{{ trigger.event.data.message.message_id }}"
              message: "–Т—Л–њ–Њ–ї–љ–µ–љ–Њ"
          - action: telegram_bot.answer_callback_query
            data:
              config_entry_id: "{{ bot_id }}"
              callback_query_id: "{{ trigger.event.data.id }}"
              message: "–°–Ї—А–Є–њ—В –Ј–∞–њ—Г—Й–µ–љ вЬЕ"

      ############################################################
      # –Ф–Њ–±–∞–≤–ї–µ–љ–Є–µ –њ—Г–љ–Ї—В–∞ —В–µ–Ї—Б—В–Њ–Љ (–Ь–£–Ы–ђ–Ґ–Ш + –Ч–Р–©–Ш–Ґ–Р –Ю–Ґ –Ф–£–С–Ы–Х–Щ)
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_text'
                 and trigger.event.data.text not in [
                   'рЯУЛ –Я–Њ–Ї–∞–Ј–∞—В—М —Б–њ–Є—Б–Њ–Ї',
                   'рЯЧС –Ю—З–Є—Б—В–Є—В—М –≤—Л–њ–Њ–ї–љ–µ–љ–љ—Л–µ',
                   'рЯФД –°–Є–љ—Е—А–Њ–љ–Є–Ј–∞—Ж–Є—П'
                 ]
                 and not (trigger.event.data.text | trim).startswith('/') }}
        sequence:
          - variables:
              raw_text: "{{ trigger.event.data.text }}"
              candidates: >
                {% set parts = raw_text.replace('.', ',').split(',') %}
                {{ parts | map('trim') | reject('equalto','') | list }}

          - action: todo.get_items
            target:
              entity_id: "{{ todo_entity }}"
            response_variable: current

          - repeat:
              for_each: "{{ candidates }}"
              sequence:
                - variables:
                    raw: "{{ repeat.item }}"
                    new_item: "{{ repeat.item | lower | replace(' ','') }}"

                - variables:
                    active_items: >
                      {{ current[todo_entity]['items']
                         | selectattr('status','eq','needs_action')
                         | list }}
                    completed_items: >
                      {{ current[todo_entity]['items']
                         | selectattr('status','eq','completed')
                         | list }}

                    active_norm: >
                      {{ active_items
                         | map(attribute='summary')
                         | map('lower')
                         | map('replace',' ','')
                         | list }}

                    completed_norm: >
                      {{ completed_items
                         | map(attribute='summary')
                         | map('lower')
                         | map('replace',' ','')
                         | list }}

                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ new_item in active_norm }}"
                      sequence:
                        - action: telegram_bot.send_message
                          data:
                            config_entry_id: "{{ bot_id }}"
                            target: "{{ chat_id }}"
                            message: "вЪ†пЄП –Я—Г–љ–Ї—В ¬Ђ{{ raw }}¬ї —Г–ґ–µ –µ—Б—В—М –≤ —Б–њ–Є—Б–Ї–µ"

                    - conditions:
                        - condition: template
                          value_template: "{{ new_item in completed_norm }}"
                      sequence:
                        - variables:
                            idx: "{{ completed_norm.index(new_item) }}"
                            uid: "{{ completed_items[idx].uid }}"
                        - action: todo.update_item
                          target:
                            entity_id: "{{ todo_entity }}"
                          data:
                            item: "{{ uid }}"
                            status: needs_action

                    - conditions:
                        - condition: template
                          value_template: >
                            {{ new_item not in active_norm
                               and new_item not in completed_norm }}
                      sequence:
                        - action: todo.add_item
                          target:
                            entity_id: "{{ todo_entity }}"
                          data:
                            item: "{{ raw }}"

          - action: todo.get_items
            target:
              entity_id: "{{ todo_entity }}"
            response_variable: todo_resp

          - variables:
              items: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','needs_action')
                   | list }}
              has_completed: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','completed')
                   | list | length > 0 }}
              text: >
                {% if items | length == 0 %}
                  рЯЫТ –°–њ–Є—Б–Њ–Ї –њ–Њ–Ї—Г–њ–Њ–Ї –њ—Г—Б—В рЯ§ЈвАНвЩВпЄП
                {% else %}
                  рЯЫТ –°–њ–Є—Б–Њ–Ї –њ–Њ–Ї—Г–њ–Њ–Ї:
                {% endif %}
              keyboard: >
                {% set r = namespace(v=[]) %}
                {% for i in items %}
                  {% set r.v = r.v + [[['вЬЕ ' ~ i.summary, '/done_' ~ i.uid]]] %}
                {% endfor %}
                {% if has_completed %}
                  {% set r.v = r.v + [[['рЯУВ –Т—Б–µ','/show_all']]] %}
                {% endif %}
                {{ r.v }}

          - action: telegram_bot.send_message
            data:
              config_entry_id: "{{ bot_id }}"
              target: "{{ chat_id }}"
              message: "{{ text }}"
              inline_keyboard: "{{ keyboard }}"

      ############################################################
      # Inline-–Ї–љ–Њ–њ–Ї–Є вАФ UI (edit_message) вАФ –Ю–С–Ђ–І–Э–Ђ–Х CALLBACK
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_callback'
                 and not trigger.event.data.data.startswith('/sync_') }}
        sequence:
          - variables:
              cb: "{{ trigger.event.data.data }}"
              msg_id: "{{ trigger.event.data.message.message_id }}"

          - if:
              - condition: template
                value_template: "{{ cb.startswith('/done_') }}"
            then:
              - action: todo.update_item
                target:
                  entity_id: "{{ todo_entity }}"
                data:
                  item: "{{ cb.split('_',1)[1] }}"
                  status: completed

          - if:
              - condition: template
                value_template: "{{ cb.startswith('/reopen_') }}"
            then:
              - action: todo.update_item
                target:
                  entity_id: "{{ todo_entity }}"
                data:
                  item: "{{ cb.split('_',1)[1] }}"
                  status: needs_action

          - if:
              - condition: template
                value_template: "{{ cb == '/clear_completed' }}"
            then:
              - action: todo.remove_completed_items
                target:
                  entity_id: "{{ todo_entity }}"

          - action: todo.get_items
            target:
              entity_id: "{{ todo_entity }}"
            response_variable: todo_resp

          - variables:
              items_all: "{{ todo_resp[todo_entity]['items'] | default([]) }}"
              has_completed: >
                {{ items_all
                   | selectattr('status','eq','completed')
                   | list | length > 0 }}
              mode: >
                {% if cb == '/show_all' %}all{% elif cb == '/show_active' %}active{% else %}active{% endif %}
              items: >
                {% if mode == 'all' %}
                  {{ items_all }}
                {% else %}
                  {{ items_all
                     | selectattr('status','eq','needs_action')
                     | list }}
                {% endif %}
              text: >
                {% if items | length == 0 %}
                  рЯЫТ –°–њ–Є—Б–Њ–Ї –њ–Њ–Ї—Г–њ–Њ–Ї –њ—Г—Б—В рЯ§ЈвАНвЩВпЄП
                {% else %}
                  рЯЫТ –°–њ–Є—Б–Њ–Ї –њ–Њ–Ї—Г–њ–Њ–Ї:
                {% endif %}
              keyboard: >
                {% set r = namespace(v=[]) %}
                {% for i in items %}
                  {% if i.status == 'needs_action' %}
                    {% set r.v = r.v + [[['вЬЕ ' ~ i.summary, '/done_' ~ i.uid]]] %}
                  {% else %}
                    {% set r.v = r.v + [[['вШСпЄП ' ~ i.summary, '/reopen_' ~ i.uid]]] %}
                  {% endif %}
                {% endfor %}
                {% if has_completed %}
                  {% if mode == 'active' %}
                    {% set r.v = r.v + [[['рЯУВ –Т—Б–µ','/show_all']]] %}
                  {% else %}
                    {% set r.v = r.v + [[['рЯЫТ –Р–Ї—В–Є–≤–љ—Л–µ','/show_active']]] %}
                  {% endif %}
                  {% set r.v = r.v + [[['рЯЧС –Ю—З–Є—Б—В–Є—В—М','/clear_completed']]] %}
                {% endif %}
                {{ r.v }}

          - action: telegram_bot.edit_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message_id: "{{ msg_id }}"
              message: "{{ text }}"
              inline_keyboard: "{{ keyboard }}"

          - action: telegram_bot.answer_callback_query
            data:
              config_entry_id: "{{ bot_id }}"
              callback_query_id: "{{ trigger.event.data.id }}"
              message: "–У–Њ—В–Њ–≤–Њ"
