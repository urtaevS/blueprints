blueprint:
  name: Telegram To-do List
  description: >
    Базовый вариант:
    - edit_message для inline-кнопок
    - переключение Active / All (только если есть completed)
    - динамическая кнопка Очистить
    - защита от дублей
    - reopen по ☑️
    - поддержка добавления через "," и "."
    - синхронизация через скрипты (опционально)
    - HA 2026.04+
  domain: automation

  input:
    todo_entity:
      name: To-do список
      selector:
        entity:
          domain: todo

    telegram_chat_id:
      name: Telegram chat_id
      selector:
        number:

    bot_config_entry_id:
      name: Config Entry ID бота
      selector:
        text:

    sync_script_1_name:
      name: Название кнопки скрипта 1
      selector:
        text: {}
      default: "Скрипт 1"

    sync_script_1:
      name: Скрипт синхронизации 1 (опционально)
      selector:
        entity:
          domain: script
      default: ""

    sync_script_2_name:
      name: Название кнопки скрипта 2
      selector:
        text: {}
      default: "Скрипт 2"
      
    sync_script_2:
      name: Скрипт синхронизации 2 (опционально)
      selector:
        entity:
          domain: script
      default: ""

    sync_script_3_name:
      name: Название кнопки скрипта 3
      selector:
        text: {}
      default: "Скрипт 3"
      
    sync_script_3:
      name: Скрипт синхронизации 3 (опционально)
      selector:
        entity:
          domain: script
      default: ""

mode: restart
max_exceeded: silent

variables:
  todo_entity: !input todo_entity
  chat_id: !input telegram_chat_id
  bot_id: !input bot_config_entry_id
  sync_script_1: !input sync_script_1
  sync_script_2: !input sync_script_2
  sync_script_3: !input sync_script_3
  sync_script_1_name: !input sync_script_1_name
  sync_script_2_name: !input sync_script_2_name
  sync_script_3_name: !input sync_script_3_name

trigger:
  - platform: event
    event_type: telegram_command
  - platform: event
    event_type: telegram_text
  - platform: event
    event_type: telegram_callback

condition:
  - condition: template
    value_template: >
      {{
        trigger.event.data.chat_id | int == chat_id | int
        and
        trigger.event.data.bot.config_entry_id == bot_id
      }}

action:
  - choose:

      ############################################################
      # /start — только сообщение с клавиатурой (без списка)
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_command'
                 and trigger.event.data.command == '/start' }}
        sequence:
          - variables:
              has_scripts: >
                {{ sync_script_1 != '' or sync_script_2 != '' or sync_script_3 != '' }}

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ has_scripts }}"
                sequence:
                  - action: telegram_bot.send_message
                    data:
                      config_entry_id: "{{ bot_id }}"
                      chat_id: "{{ chat_id }}"
                      message: "Используй кнопки внизу ⬇️"
                      keyboard:
                        - "📋 Показать список"
                        - "🗑 Очистить выполненные"
                        - "🔄 Синхронизация"
                      resize_keyboard: true
                      one_time_keyboard: false
              - conditions:
                  - condition: template
                    value_template: "{{ not has_scripts }}"
                sequence:
                  - action: telegram_bot.send_message
                    data:
                      config_entry_id: "{{ bot_id }}"
                      chat_id: "{{ chat_id }}"
                      message: "Используй кнопки внизу ⬇️"
                      keyboard:
                        - "📋 Показать список"
                        - "🗑 Очистить выполненные"
                      resize_keyboard: true
                      one_time_keyboard: false

      ############################################################
      # /list — показать активные (аналогично кнопке "📋 Показать список")
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_command'
                 and trigger.event.data.command == '/list' }}
        sequence:
          - action: todo.get_items
            target:
              entity_id: "{{ todo_entity }}"
            response_variable: todo_resp

          - variables:
              items: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','needs_action')
                   | list }}
              has_completed: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','completed')
                   | list | length > 0 }}
              text: >
                {% if items | length == 0 %}
                  🛒 Список покупок пуст 🤷‍♂️
                {% else %}
                  🛒 Список покупок:
                {% endif %}
              keyboard: >
                {% set r = namespace(v=[]) %}
                {% for i in items %}
                  {% set r.v = r.v + [[['✅ ' ~ i.summary, '/done_' ~ i.uid]]] %}
                {% endfor %}
                {% if has_completed %}
                  {% set r.v = r.v + [[['📂 Все','/show_all']]] %}
                {% endif %}
                {{ r.v }}

          - action: telegram_bot.send_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message: "{{ text }}"
              inline_keyboard: "{{ keyboard }}"

      ############################################################
      # REPLY: 📋 Показать список
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_text'
                 and trigger.event.data.text == '📋 Показать список' }}
        sequence:
          - action: todo.get_items
            target:
              entity_id: "{{ todo_entity }}"
            response_variable: todo_resp

          - variables:
              items: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','needs_action')
                   | list }}
              has_completed: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','completed')
                   | list | length > 0 }}
              text: >
                {% if items | length == 0 %}
                  🛒 Список покупок пуст 🤷‍♂️
                {% else %}
                  🛒 Список покупок:
                {% endif %}
              keyboard: >
                {% set r = namespace(v=[]) %}
                {% for i in items %}
                  {% set r.v = r.v + [[['✅ ' ~ i.summary, '/done_' ~ i.uid]]] %}
                {% endfor %}
                {% if has_completed %}
                  {% set r.v = r.v + [[['📂 Все','/show_all']]] %}
                {% endif %}
                {{ r.v }}

          - action: telegram_bot.send_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message: "{{ text }}"
              inline_keyboard: "{{ keyboard }}"

      ############################################################
      # REPLY: 🗑 Очистить выполненные
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_text'
                 and trigger.event.data.text == '🗑 Очистить выполненные' }}
        sequence:
          - action: todo.remove_completed_items
            target:
              entity_id: "{{ todo_entity }}"

          - action: todo.get_items
            target:
              entity_id: "{{ todo_entity }}"
            response_variable: todo_resp

          - variables:
              items: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','needs_action')
                   | list }}
              text: >
                {% if items | length == 0 %}
                  🛒 Список покупок пуст 🤷‍♂️
                {% else %}
                  🛒 Список покупок:
                {% endif %}
              keyboard: >
                {% set r = namespace(v=[]) %}
                {% for i in items %}
                  {% set r.v = r.v + [[['✅ ' ~ i.summary, '/done_' ~ i.uid]]] %}
                {% endfor %}
                {{ r.v }}

          - action: telegram_bot.send_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message: "{{ text }}"
              inline_keyboard: "{{ keyboard }}"

      ############################################################
      # REPLY: 🔄 Синхронизация — показать inline-кнопки скриптов
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_text'
                 and trigger.event.data.text == '🔄 Синхронизация' }}
        sequence:
          - variables:
              sync_keyboard: >
                {% set scripts = [] %}
                {% if sync_script_1 and sync_script_1 != '' %}
                  {% set scripts = scripts + [[['🔹 ' ~ sync_script_1_name, '/sync_1']]] %}
                {% endif %}
                {% if sync_script_2 and sync_script_2 != '' %}
                  {% set scripts = scripts + [[['🔹 ' ~ sync_script_2_name, '/sync_2']]] %}
                {% endif %}
                {% if sync_script_3 and sync_script_3 != '' %}
                  {% set scripts = scripts + [[['🔹 ' ~ sync_script_3_name, '/sync_3']]] %}
                {% endif %}
                {{ scripts }}

          - action: telegram_bot.send_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message: "Выбери действие"
              inline_keyboard: "{{ sync_keyboard }}"

      ############################################################
      # CALLBACK: Запуск скрипта 1
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_callback'
                 and trigger.event.data.data == '/sync_1'
                 and sync_script_1 != '' }}
        sequence:
          - action: script.turn_on
            target:
              entity_id: "{{ sync_script_1 }}"
          - action: telegram_bot.edit_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message_id: "{{ trigger.event.data.message.message_id }}"
              message: "Выполнено"
          - action: telegram_bot.answer_callback_query
            data:
              config_entry_id: "{{ bot_id }}"
              callback_query_id: "{{ trigger.event.data.id }}"
              message: "Скрипт запущен ✅"

      ############################################################
      # CALLBACK: Запуск скрипта 2
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_callback'
                 and trigger.event.data.data == '/sync_2'
                 and sync_script_2 != '' }}
        sequence:
          - action: script.turn_on
            target:
              entity_id: "{{ sync_script_2 }}"
          - action: telegram_bot.edit_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message_id: "{{ trigger.event.data.message.message_id }}"
              message: "Выполнено"
          - action: telegram_bot.answer_callback_query
            data:
              config_entry_id: "{{ bot_id }}"
              callback_query_id: "{{ trigger.event.data.id }}"
              message: "Скрипт запущен ✅"

      ############################################################
      # CALLBACK: Запуск скрипта 3
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_callback'
                 and trigger.event.data.data == '/sync_3'
                 and sync_script_3 != '' }}
        sequence:
          - action: script.turn_on
            target:
              entity_id: "{{ sync_script_3 }}"
          - action: telegram_bot.edit_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message_id: "{{ trigger.event.data.message.message_id }}"
              message: "Выполнено"
          - action: telegram_bot.answer_callback_query
            data:
              config_entry_id: "{{ bot_id }}"
              callback_query_id: "{{ trigger.event.data.id }}"
              message: "Скрипт запущен ✅"

      ############################################################
      # Добавление пункта текстом (МУЛЬТИ + ЗАЩИТА ОТ ДУБЛЕЙ)
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_text'
                 and trigger.event.data.text not in [
                   '📋 Показать список',
                   '🗑 Очистить выполненные',
                   '🔄 Синхронизация'
                 ]
                 and not (trigger.event.data.text | trim).startswith('/') }}
        sequence:
          - variables:
              raw_text: "{{ trigger.event.data.text }}"
              candidates: >
                {% set parts = raw_text.replace('.', ',').split(',') %}
                {{ parts | map('trim') | reject('equalto','') | list }}

          - action: todo.get_items
            target:
              entity_id: "{{ todo_entity }}"
            response_variable: current

          - repeat:
              for_each: "{{ candidates }}"
              sequence:
                - variables:
                    raw: "{{ repeat.item }}"
                    new_item: "{{ repeat.item | lower | replace(' ','') }}"

                - variables:
                    active_items: >
                      {{ current[todo_entity]['items']
                         | selectattr('status','eq','needs_action')
                         | list }}
                    completed_items: >
                      {{ current[todo_entity]['items']
                         | selectattr('status','eq','completed')
                         | list }}

                    active_norm: >
                      {{ active_items
                         | map(attribute='summary')
                         | map('lower')
                         | map('replace',' ','')
                         | list }}

                    completed_norm: >
                      {{ completed_items
                         | map(attribute='summary')
                         | map('lower')
                         | map('replace',' ','')
                         | list }}

                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ new_item in active_norm }}"
                      sequence:
                        - action: telegram_bot.send_message
                          data:
                            config_entry_id: "{{ bot_id }}"
                            chat_id: "{{ chat_id }}"
                            message: "⚠️ Пункт «{{ raw }}» уже есть в списке"

                    - conditions:
                        - condition: template
                          value_template: "{{ new_item in completed_norm }}"
                      sequence:
                        - variables:
                            idx: "{{ completed_norm.index(new_item) }}"
                            uid: "{{ completed_items[idx].uid }}"
                        - action: todo.update_item
                          target:
                            entity_id: "{{ todo_entity }}"
                          data:
                            item: "{{ uid }}"
                            status: needs_action

                    - conditions:
                        - condition: template
                          value_template: >
                            {{ new_item not in active_norm
                               and new_item not in completed_norm }}
                      sequence:
                        - action: todo.add_item
                          target:
                            entity_id: "{{ todo_entity }}"
                          data:
                            item: "{{ raw }}"

          - action: todo.get_items
            target:
              entity_id: "{{ todo_entity }}"
            response_variable: todo_resp

          - variables:
              items: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','needs_action')
                   | list }}
              has_completed: >
                {{ todo_resp[todo_entity]['items']
                   | selectattr('status','eq','completed')
                   | list | length > 0 }}
              text: >
                {% if items | length == 0 %}
                  🛒 Список покупок пуст 🤷‍♂️
                {% else %}
                  🛒 Список покупок:
                {% endif %}
              keyboard: >
                {% set r = namespace(v=[]) %}
                {% for i in items %}
                  {% set r.v = r.v + [[['✅ ' ~ i.summary, '/done_' ~ i.uid]]] %}
                {% endfor %}
                {% if has_completed %}
                  {% set r.v = r.v + [[['📂 Все','/show_all']]] %}
                {% endif %}
                {{ r.v }}

          - action: telegram_bot.send_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message: "{{ text }}"
              inline_keyboard: "{{ keyboard }}"

      ############################################################
      # Inline-кнопки — UI (edit_message) — ОБЫЧНЫЕ CALLBACK
      ############################################################
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.event_type == 'telegram_callback'
                 and not trigger.event.data.data.startswith('/sync_') }}
        sequence:
          - variables:
              cb: "{{ trigger.event.data.data }}"
              msg_id: "{{ trigger.event.data.message.message_id }}"

          - if:
              - condition: template
                value_template: "{{ cb.startswith('/done_') }}"
            then:
              - action: todo.update_item
                target:
                  entity_id: "{{ todo_entity }}"
                data:
                  item: "{{ cb.split('_',1)[1] }}"
                  status: completed

          - if:
              - condition: template
                value_template: "{{ cb.startswith('/reopen_') }}"
            then:
              - action: todo.update_item
                target:
                  entity_id: "{{ todo_entity }}"
                data:
                  item: "{{ cb.split('_',1)[1] }}"
                  status: needs_action

          - if:
              - condition: template
                value_template: "{{ cb == '/clear_completed' }}"
            then:
              - action: todo.remove_completed_items
                target:
                  entity_id: "{{ todo_entity }}"

          - action: todo.get_items
            target:
              entity_id: "{{ todo_entity }}"
            response_variable: todo_resp

          - variables:
              items_all: "{{ todo_resp[todo_entity]['items'] | default([]) }}"
              has_completed: >
                {{ items_all
                   | selectattr('status','eq','completed')
                   | list | length > 0 }}
              mode: >
                {% if cb == '/show_all' %}all{% elif cb == '/show_active' %}active{% else %}active{% endif %}
              items: >
                {% if mode == 'all' %}
                  {{ items_all }}
                {% else %}
                  {{ items_all
                     | selectattr('status','eq','needs_action')
                     | list }}
                {% endif %}
              text: >
                {% if items | length == 0 %}
                  🛒 Список покупок пуст 🤷‍♂️
                {% else %}
                  🛒 Список покупок:
                {% endif %}
              keyboard: >
                {% set r = namespace(v=[]) %}
                {% for i in items %}
                  {% if i.status == 'needs_action' %}
                    {% set r.v = r.v + [[['✅ ' ~ i.summary, '/done_' ~ i.uid]]] %}
                  {% else %}
                    {% set r.v = r.v + [[['☑️ ' ~ i.summary, '/reopen_' ~ i.uid]]] %}
                  {% endif %}
                {% endfor %}
                {% if has_completed %}
                  {% if mode == 'active' %}
                    {% set r.v = r.v + [[['📂 Все','/show_all']]] %}
                  {% else %}
                    {% set r.v = r.v + [[['🛒 Активные','/show_active']]] %}
                  {% endif %}
                  {% set r.v = r.v + [[['🗑 Очистить','/clear_completed']]] %}
                {% endif %}
                {{ r.v }}

          - action: telegram_bot.edit_message
            data:
              config_entry_id: "{{ bot_id }}"
              chat_id: "{{ chat_id }}"
              message_id: "{{ msg_id }}"
              message: "{{ text }}"
              inline_keyboard: "{{ keyboard }}"

          - action: telegram_bot.answer_callback_query
            data:
              config_entry_id: "{{ bot_id }}"
              callback_query_id: "{{ trigger.event.data.id }}"
              message: "Готово"
